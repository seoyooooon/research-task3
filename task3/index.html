<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster Archive - 콘텐츠 시청 기록 포스터 달력</title>
  <meta name="description" content="내가 시청한 영화, 드라마, 예능을 포스터 도장으로 캘린더에 기록하고 나만의 콘텐츠 시각적 아카이브를 구축하세요.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ef724f">
  
  <!-- Fonts & Icons -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <!-- App Shell Container -->
  <div id="app-container">
    
    <!-- Top Header -->
    <header id="app-header">
      <div class="header-logo">
        <i class="fa-solid fa-ticket-simple logo-icon"></i>
        <h1>Poster Archive</h1>
      </div>
      
      <div class="header-actions">
        <!-- CSV Upload Dropzone / Button -->
        <div class="upload-container">
          <label for="csv-upload-input" id="csv-dropzone" class="upload-dropzone">
            <i class="fa-solid fa-file-csv upload-icon"></i>
            <span class="upload-text">CSV 업로드</span>
          </label>
          <input type="file" id="csv-upload-input" accept=".csv" style="display: none;">
        </div>
        
        <!-- Setting Button -->
        <button id="btn-settings" class="action-btn" title="설정">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
    </header>

    <!-- Calendar Controls -->
    <section id="calendar-controls">
      <button id="btn-prev-month" class="nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
      <h2 id="current-month-year">2026년 6월</h2>
      <button id="btn-next-month" class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
    </section>

    <!-- Main Calendar Grid -->
    <main id="calendar-container">
      <!-- Weekday Headers -->
      <div class="weekdays-grid">
        <div class="weekday sun">일</div>
        <div class="weekday">월</div>
        <div class="weekday">화</div>
        <div class="weekday">수</div>
        <div class="weekday">목</div>
        <div class="weekday">금</div>
        <div class="weekday sat">토</div>
      </div>
      <!-- Days Grid (42 slots filled dynamically) -->
      <div id="calendar-days" class="days-grid"></div>
    </main>

    <!-- Footer Stats / Guide -->
    <footer id="app-footer">
      <p id="stats-summary">이번 달에 시청한 콘텐츠: <strong id="total-watched-count">0</strong>개</p>
      <a href="sample_netflix_records.csv" download id="link-download-sample" class="sample-download-link">
        <i class="fa-solid fa-download"></i> 샘플 CSV 다운로드
      </a>
    </footer>

  </div>

  <!-- Modal 1: 설정 (TMDB API Key, 데이터 관리) -->
  <div id="modal-settings" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3>서비스 설정</h3>
        <button class="close-btn" data-modal="modal-settings"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="tmdb-api-key">TMDB API Read Access Token (v4 auth)</label>
          <p class="field-desc">TMDB 회원가입 후 'API' 메뉴에서 발급받은 v4 Read Access Token을 붙여넣으세요. 입력하지 않으면 대표 영화에 한해 Mock 데이터로 자동 시연됩니다.</p>
          <textarea id="tmdb-api-key" placeholder="Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        </div>
        
        <div class="form-group row">
          <label for="toggle-mock-search">API Key 없을 때 Mock 데이터 사용</label>
          <input type="checkbox" id="toggle-mock-search" checked>
        </div>

        <hr class="modal-divider">
        
        <div class="form-group">
          <label>데이터 백업 및 초기화</label>
          <div class="button-group">
            <button id="btn-backup" class="secondary-btn"><i class="fa-solid fa-file-export"></i> 데이터 백업 (JSON)</button>
            <button id="btn-restore-trigger" class="secondary-btn"><i class="fa-solid fa-file-import"></i> 데이터 복원</button>
            <input type="file" id="restore-file-input" accept=".json" style="display: none;">
            <button id="btn-clear-data" class="danger-btn"><i class="fa-solid fa-trash-can"></i> 전체 데이터 초기화</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal 2: 시청 기록 등록 및 편집 (간편 기록) -->
  <div id="modal-record-detail" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3 id="record-modal-title">시청 기록 상세</h3>
        <div class="modal-header-right">
          <span id="detail-page-indicator" class="page-indicator">1 / 1</span>
          <button class="close-btn" data-modal="modal-record-detail"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <div class="modal-body">
        <div class="detail-navigation-container">
          <button type="button" id="btn-detail-prev" class="detail-nav-btn" title="이전 기록"><i class="fa-solid fa-chevron-left"></i></button>
          
          <div class="record-detail-layout">
            <!-- Left: Poster Preview -->
            <div class="poster-preview-container">
              <img id="detail-poster-img" src="" alt="콘텐츠 포스터">
            </div>
            <!-- Right: Input Form -->
            <form id="record-detail-form" class="record-form">
              <input type="hidden" id="detail-record-id">
              <input type="hidden" id="detail-date">
              
              <div class="form-group">
                <label>콘텐츠 제목</label>
                <input type="text" id="detail-title" readonly class="input-readonly">
              </div>

              <div class="form-group">
                <label>시청일</label>
                <input type="date" id="detail-display-date" required>
              </div>
              
              <div class="form-group">
                <label>별점</label>
                <div class="rating-stars">
                  <i class="fa-solid fa-star rating-star" data-value="1"></i>
                  <i class="fa-solid fa-star rating-star" data-value="2"></i>
                  <i class="fa-solid fa-star rating-star" data-value="3"></i>
                  <i class="fa-solid fa-star rating-star" data-value="4"></i>
                  <i class="fa-solid fa-star rating-star" data-value="5"></i>
                </div>
                <input type="hidden" id="detail-rating" value="0">
              </div>

              <div class="form-group">
                <label for="detail-review">한 줄 평</label>
                <input type="text" id="detail-review" placeholder="시청한 소감을 한 줄로 남겨보세요.">
              </div>

              <div class="form-group">
                <label for="detail-companions">함께 시청한 사람</label>
                <input type="text" id="detail-companions" placeholder="가족, 친구 등 (쉼표로 구분)">
              </div>

              <div class="form-actions-row">
                <button type="button" id="btn-delete-record" class="danger-btn"><i class="fa-solid fa-trash"></i> 삭제</button>
                <button type="submit" id="btn-save-record" class="primary-btn"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
              </div>
            </form>
          </div>

          <button type="button" id="btn-detail-next" class="detail-nav-btn" title="다음 기록"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal 3: 수동 추가 (날짜 클릭 시 검색하여 수동 추가) -->
  <div id="modal-manual-add" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3 id="manual-modal-title">시청 기록 직접 추가</h3>
        <button class="close-btn" data-modal="modal-manual-add"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="manual-target-date">
        <div class="search-bar-row">
          <input type="text" id="manual-search-input" placeholder="영화, 드라마, 예능 제목을 입력하세요...">
          <button id="btn-manual-search" class="primary-btn"><i class="fa-solid fa-magnifying-glass"></i> 검색</button>
        </div>
        
        <!-- Search Results Grid -->
        <div id="manual-search-results" class="search-results-container">
          <p class="search-info-text">검색어를 입력하고 검색 버튼을 누르세요.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Floating storybook doodles -->
  <div class="doodle doodle-star">
    <svg viewBox="0 0 100 100" width="80" height="80">
      <path d="M 50 12 L 61 36 L 88 36 L 66 53 L 75 79 L 50 63 L 25 79 L 34 53 L 12 36 L 39 36 Z" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="doodle doodle-face">
    <svg viewBox="0 0 100 100" width="70" height="70">
      <circle cx="50" cy="50" r="38" fill="none" stroke="#000000" stroke-width="2.5"/>
      <circle cx="36" cy="42" r="3.5" fill="#000000"/>
      <circle cx="64" cy="42" r="3.5" fill="#000000"/>
      <path d="M 34 60 Q 50 72 66 60" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="doodle doodle-camera">
    <svg viewBox="0 0 100 100" width="75" height="75">
      <rect x="20" y="32" width="60" height="42" rx="8" fill="none" stroke="#000000" stroke-width="2.5"/>
      <path d="M 40 32 L 44 24 L 56 24 L 60 32 Z" fill="none" stroke="#000000" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="50" cy="53" r="14" fill="none" stroke="#000000" stroke-width="2.5"/>
      <circle cx="70" cy="42" r="2.5" fill="#000000"/>
    </svg>
  </div>

  <script src="app.js?v=22"></script>
  <script>
    // 서비스 워커 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('서비스 워커가 성공적으로 등록되었습니다.', reg.scope))
          .catch((err) => console.log('서비스 워커 등록 실패:', err));
      });
    }
  </script>
</body>
</html>
